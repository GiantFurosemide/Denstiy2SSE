project:
  output_dir: outputs
  seed: 42

run:
  stages:
    - generate-data
    - train

data:
  train_dir: data/train
  val_dir: data/val
  test_dir: data/test
  voxel_size: 1.5
  box_size: 32
  K_min: 2
  K_max: 3

synthetic:
  num_samples_train: 4
  num_samples_val: 2
  num_samples_test: 2
  retry_limit: 300
  length_min: 12.0
  length_max: 24.0
  tube_radius: 2.5
  export_mrc: false
  export_pdb: false

model:
  in_channels: 1
  base_channels: 8
  hidden_dim: 64

training:
  batch_size: 2
  num_epochs: 1
  learning_rate: 0.001
  weight_decay: 0.00001
  num_workers: 0
  device: cpu

loss:
  w_pos: 1.0
  w_dir: 1.0
  w_len: 1.0
