# Default training config / 默认训练配置
project:
  output_dir: outputs # output root directory / 输出根目录
  seed: 42 # global random seed / 全局随机种子

data:
  train_dir: data/train # training NPZ directory / 训练集NPZ目录
  val_dir: data/val # validation NPZ directory / 验证集NPZ目录
  test_dir: data/test # test NPZ directory / 测试集NPZ目录
  voxel_size: 1.5 # voxel size in angstrom / 体素尺寸(埃)
  box_size: 96 # cubic grid size per axis / 立方网格边长
  K_min: 2 # minimum helices in synthetic samples / 合成样本最小螺旋数
  K_max: 5 # maximum helices and output slots / 最大螺旋数与输出槽位

model:
  name: baseline_cnn # model registry name / 模型注册名
  in_channels: 1 # input channel count / 输入通道数
  base_channels: 16 # base CNN channel width / CNN基础通道宽度
  hidden_dim: 256 # shared hidden dim fallback / 通用隐藏维度

training:
  batch_size: 4 # mini-batch size / 小批量大小
  num_epochs: 2 # total training epochs / 训练轮数
  learning_rate: 0.001 # optimizer learning rate / 学习率
  weight_decay: 0.00001 # L2 weight decay / 权重衰减
  num_workers: 0 # dataloader worker count / 数据加载进程数
  device: auto # device: auto/cpu/cuda/mps / 设备选择
  tiny_overfit: false # enable tiny-overfit mode / 是否启用极小样本过拟合
  save_every_epoch: true # save checkpoint each epoch / 是否每轮保存checkpoint
  checkpoint_pattern: "epoch_{epoch:04d}.pt" # epoch checkpoint filename pattern / 每轮checkpoint命名模板
  keep_last_k_epoch_checkpoints: 0 # keep latest K epoch checkpoints (0=all) / 保留最近K个轮次checkpoint(0为全部)

loss:
  w_pos: 1.0 # center position loss weight / 位置损失权重
  w_dir: 1.0 # direction loss weight / 方向损失权重
  w_len: 1.0 # length loss weight / 长度损失权重
